<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weekflow</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f6fa;color:#1a1a2e;font-family:'Inter','Noto Sans SC',sans-serif;font-size:14px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#d0d0e0;border-radius:4px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
input::placeholder,textarea::placeholder{color:#bbbbc8}
button:focus{outline:none}

/* Table (Notion-like) */
.wftable{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  background:#fff;
  border:1px solid #ebebf5;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,0.05);
}
.wftable thead th{
  position:sticky; top:0; z-index:2;
  background:#fafafe;
  font-size:12px;
  color:#888;
  font-weight:600;
  padding:10px 10px;
  border-bottom:1px solid #ebebf5;
  text-align:left;
  user-select:none;
  cursor:pointer;
  white-space:nowrap;
}
.wftable tbody td{
  border-bottom:1px solid #f0f0fa;
  padding:8px 10px;
  vertical-align:middle;
}
.wfrow:hover td{background:#fbfbff}
.wfrowdone td{background:#fcfcff}
.wfrowdone:hover td{background:#f7f7ff}
.wfcellinput{
  width:100%;
  border:none;
  background:transparent;
  color:#1a1a2e;
  font-size:13px;
  outline:none;
}
.wfcellinput:disabled{color:#aaa}
.wfselect{
  width:100%;
  border:1.5px solid #e0e0ee;
  border-radius:8px;
  padding:6px 8px;
  background:#fff;
  color:#555;
  font-size:12px;
  outline:none;
}
.wfselect:disabled{opacity:.6}
.wfcheck{
  width:16px;height:16px;
  accent-color:#4f46e5;
}
.wfactions{
  opacity:0;
  transition:opacity .15s;
  display:flex;
  gap:6px;
  justify-content:flex-end;
}
.wfrow:hover .wfactions{opacity:1}
.wfbadge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  padding:2px 8px;
  border-radius:999px;
  border:1px solid #ebebf5;
  background:#f8f8fc;
  color:#888;
  white-space:nowrap;
}
.wfbadge.orange{border-color:#ffd8a0;background:#fff8f0;color:#e07800}
.wfmuted{color:#aaa;font-size:12px}

/* Longterm split pane */
.ltwrap{display:flex; gap:14px; align-items:flex-start}
.ltleft{flex:0 0 420px; min-width:320px}
.ltright{flex:1; min-width:320px}
.ltlane{
  background:#fff;
  border:1px solid #ebebf5;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,0.05);
}
.ltitem{border-bottom:1px solid #f0f0fa}
.ltitem:last-child{border-bottom:none}
.ltitemHead{
  padding:12px 14px;
  display:flex;
  align-items:flex-start;
  gap:10px;
  cursor:pointer;
}
.ltitemHead:hover{background:#fbfbff}
.ltcaret{
  width:22px;height:22px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  background:#f5f5fa;border:1px solid #ebebf5;color:#888;
  flex-shrink:0;
}
.ltmeta{flex:1; min-width:0}
.lttitle{
  font-weight:700;
  font-size:14px;
  color:#1a1a2e;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.ltsub{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:6px;
  align-items:center;
}
.ltsummary{
  padding:0 14px 12px 46px;
}
.ltsummaryInner{
  background:#f8f8fc;
  border:1px solid #ebebf5;
  border-radius:10px;
  padding:10px 12px;
}
.ltlogline{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:7px 0;
  border-bottom:1px dashed #e9e9f7;
}
.ltlogline:last-child{border-bottom:none}
.ltpanel{
  background:#fff;
  border:1px solid #ebebf5;
  border-radius:12px;
  box-shadow:0 2px 12px rgba(0,0,0,0.05);
  overflow:hidden;
}
.ltpanelHead{
  padding:14px 16px;
  border-bottom:1px solid #ebebf5;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.ltpanelBody{padding:16px}
.ltpanelClose{
  background:#f5f5fa;border:1px solid #ebebf5;color:#888;
  width:30px;height:30px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.ltgroup{margin-top:14px}
.ltgroupTitle{font-size:12px;color:#4f46e5;font-weight:700;margin-bottom:8px}
.ltcard{
  background:#f8f8fc;border:1px solid #ebebf5;border-radius:10px;
  padding:10px 12px;margin-bottom:8px;
}
.ltcardTop{display:flex;justify-content:space-between;gap:10px;margin-bottom:6px}
.ltcardTime{font-size:11px;color:#aaa}
.ltcardText{font-size:13px;color:#555;line-height:1.65;white-space:pre-wrap}
.ltcardDel{
  background:transparent;border:none;color:#ccc;cursor:pointer;font-size:12px;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useCallback,useRef,useMemo} = React;

const CLIENT_ID="575074826162-67sv63cg4gss5k5t9vcsbds0cedb3ftt.apps.googleusercontent.com";
const SCOPE="https://www.googleapis.com/auth/drive.appdata";
const TF="weekflow-tasks.json", LF="weekflow-longterm.json";

const SL={todo:"待开始",doing:"进行中",done:"已完成",postponed:"已推迟"};
const SS={
  todo:{border:"#ddddf5",text:"#6666cc",dot:"#9999dd",badge:"#eeeefc"},
  doing:{border:"#c8eedd",text:"#2a8a5a",dot:"#44aa77",badge:"#e0f5ea"},
  done:{border:"#b8e8cc",text:"#1a7a44",dot:"#33aa66",badge:"#d8f5e4"},
  postponed:{border:"#f5cccc",text:"#cc3333",dot:"#ee6666",badge:"#feeaea"},
};
const PS={
  high:{label:"高优先级",color:"#e53935",bg:"#fff0f0",border:"#ffcccc"},
  mid:{label:"中优先级",color:"#f57c00",bg:"#fff8f0",border:"#ffe0b0"},
  low:{label:"低优先级",color:"#1976d2",bg:"#f0f5ff",border:"#c5d8ff"},
};
const uid=()=>Math.random().toString(36).slice(2,10);

function getMonday(off=0){
  const n=new Date(),d=n.getDay()===0?6:n.getDay()-1,m=new Date(n);
  m.setDate(n.getDate()-d+off*7);m.setHours(0,0,0,0);return m;
}
function weekNum(d){
  const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  u.setUTCDate(u.getUTCDate()+4-(u.getUTCDay()||7));
  const y=new Date(Date.UTC(u.getUTCFullYear(),0,1));
  return Math.ceil((((u-y)/86400000)+1)/7);
}
function wk(off=0){const m=getMonday(off);return m.getFullYear()+"-W"+String(weekNum(m)).padStart(2,"0");}
function wLabel(k){
  const[y,w]=k.split("-W"),wn=parseInt(w);
  const j4=new Date(parseInt(y),0,4),m=new Date(j4);
  m.setDate(j4.getDate()-(j4.getDay()===0?6:j4.getDay()-1)+(wn-1)*7);
  const s=new Date(m);s.setDate(m.getDate()+6);
  const f=d=>(d.getMonth()+1)+"/"+d.getDate();
  if(k===wk(0))return"本周("+f(m)+"–"+f(s)+")";
  if(k===wk(-1))return"上周("+f(m)+"–"+f(s)+")";
  return y+" 第"+wn+"周("+f(m)+"–"+f(s)+")";
}
function weekStartTs(k){
  // Convert "YYYY-Wxx" to a Monday timestamp (local)
  const [y, w] = k.split("-W");
  const wn = parseInt(w,10);
  const j4 = new Date(parseInt(y,10),0,4);
  const m = new Date(j4);
  m.setDate(j4.getDate()-(j4.getDay()===0?6:j4.getDay()-1)+(wn-1)*7);
  m.setHours(0,0,0,0);
  return +m;
}
function fmtDT(ts){
  try{
    const d=new Date(ts);
    return d.toLocaleString();
  }catch{return "";}
}

// ── Drive API (FIXED VERSION) ──
async function dFind(tok, name) {
  const safeName = name.replace(/'/g, "\\'");
  const q = encodeURIComponent(`name='${safeName}' and trashed=false`);
  const url =
    "https://www.googleapis.com/drive/v3/files" +
    "?q=" + q +
    "&spaces=appDataFolder" +
    "&fields=files(id,name)";
  const r = await fetch(url, { headers: { Authorization: "Bearer " + tok } });
  if (!r.ok) {
    const err = await r.text();
    throw new Error("find " + r.status + " " + err);
  }
  const d = await r.json();
  return (d.files && d.files[0]) || null;
}
async function dRead(tok, name) {
  const f = await dFind(tok, name);
  if (!f) return null;
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`,
    { headers: { Authorization: "Bearer " + tok } }
  );
  if (!r.ok) return null;
  try { return JSON.parse(await r.text()); } catch { return null; }
}
async function dWrite(tok, name, data) {
  const existing = await dFind(tok, name);
  const metadata = existing ? { name } : { name, parents: ["appDataFolder"] };
  const form = new FormData();
  form.append("metadata", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
  form.append("file", new Blob([JSON.stringify(data)], { type: "application/json" }));
  const url =
    "https://www.googleapis.com/upload/drive/v3/files" +
    (existing ? "/" + existing.id : "") +
    "?uploadType=multipart";
  const r = await fetch(url, {
    method: existing ? "PATCH" : "POST",
    headers: { Authorization: "Bearer " + tok },
    body: form
  });
  if (!r.ok) {
    const err = await r.text();
    throw new Error("write " + r.status + " " + err);
  }
}

const inp=(x={})=>({background:"#fff",border:"1.5px solid #e0e0ee",borderRadius:8,padding:"9px 12px",color:"#1a1a2e",fontSize:13,outline:"none",width:"100%",...x});
const pb=(x={})=>({background:"#4f46e5",border:"none",color:"#fff",padding:"8px 18px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,...x});
const gb=(x={})=>({background:"transparent",border:"1.5px solid #e0e0ee",color:"#888",padding:"7px 16px",borderRadius:8,cursor:"pointer",fontSize:13,...x});

function App(){
  // ── state ──
  const [auth,setAuth]=useState("idle"); // idle|loading|ok|error
  const [tok,setTok]=useState("");
  const [userEmail,setUserEmail]=useState("");
  const [sync,setSync]=useState("idle");
  const [errMsg,setErrMsg]=useState("");
  const syncTimer=useRef(null);

  const [wd,setWd]=useState({});
  const [lt,setLt]=useState([]);
  const [week,setWeek]=useState(wk(0));
  const [view,setView]=useState("week");
  const [filt,setFilt]=useState("all");
  const [notif,setNotif]=useState(null);

  // Old states kept (compatibility)
  const [showAdd,setShowAdd]=useState(false);
  const [editT,setEditT]=useState(null);

  // Draft row (Notion-like)
  const [wf,setWf]=useState({title:"",desc:"",priority:"mid",status:"todo",tag:"",linkedLT:null});

  // Longterm create/edit
  const [showLTA,setShowLTA]=useState(false);
  const [editLT,setEditLT]=useState(null);
  const [lf,setLf]=useState({title:"",desc:"",priority:"mid",tag:""});

  // Existing modals (weekly linked quick log)
  const [logModal,setLogModal]=useState(null);
  const [logTxt,setLogTxt]=useState("");
  const [postModal,setPostModal]=useState(false);

  // New: Notion-like longterm right panel + collapsible rows
  const [ltPaneId,setLtPaneId]=useState(null);
  const [ltOpen,setLtOpen]=useState({});
  const [ltNoteWeek,setLtNoteWeek]=useState(wk(0));
  const [ltNoteText,setLtNoteText]=useState("");

  // New: table sorting
  const [tSort,setTSort]=useState({field:null,dir:"asc"}); // field: title|status|priority|tag|linkedLT|desc|createdAt

  const toast=(msg,type="ok")=>{setNotif({msg,type});setTimeout(()=>setNotif(null),3000);};

  // ── login ──
  const login=()=>{
    setAuth("loading");setErrMsg("");
    const client=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID, scope:SCOPE,
      callback:async(tr)=>{
        if(!tr||!tr.access_token){
          setErrMsg("No token: "+(tr&&tr.error||"unknown"));
          setAuth("error");return;
        }
        const t=tr.access_token;
        try{
          const ti=await fetch("https://www.googleapis.com/oauth2/v3/tokeninfo?access_token="+t);
          const td=await ti.json();
          if(td.error){throw new Error("tokeninfo: "+td.error);}
          setUserEmail(td.email||"已登录");
          const[a,b]=await Promise.all([dRead(t,TF),dRead(t,LF)]);
          if(a)setWd(a);
          if(b)setLt(b);
          setTok(t);
          setAuth("ok");
          toast("已连接 Google Drive ✓");
        }catch(e){
          console.error(e);
          setErrMsg(e.message);
          setAuth("error");
        }
      }
    });
    client.requestAccessToken({prompt:"select_account"});
  };

  const logout=()=>{
    setTok("");setAuth("idle");setUserEmail("");
    setWd({});setLt([]);
    setLtPaneId(null);
  };

  // ── sync ──
  const schedule=useCallback((t,newWd,newLt)=>{
    if(!t)return;
    if(syncTimer.current)clearTimeout(syncTimer.current);
    setSync("syncing");
    syncTimer.current=setTimeout(async()=>{
      try{
        await Promise.all([dWrite(t,TF,newWd),dWrite(t,LF,newLt)]);
        setSync("saved");setTimeout(()=>setSync("idle"),2000);
      }catch(e){console.error(e);setSync("error");toast("同步失败","warn");}
    },1200);
  },[]);

  const saveWd=useCallback(d=>{setWd(d);schedule(tok,d,lt);},[lt,schedule,tok]);
  const saveLt=useCallback(d=>{setLt(d);schedule(tok,wd,d);},[wd,schedule,tok]);

  // ── derived ──
  const CK=wk(0),PK=wk(-1);
  const tasks=wd[week]||[];
  const prevT=wd[PK]||[];
  const postponed=prevT.filter(t=>t.status==="postponed"&&!t.carriedOver);
  const hasAlert=week===CK&&postponed.length>0;
  const canEdit=week===CK;
  const allWeeks=[...new Set([CK,PK,...Object.keys(wd)])].sort((a,b)=>b.localeCompare(a)).slice(0,30);

  const stats={
    done:tasks.filter(t=>t.status==="done").length,
    doing:tasks.filter(t=>t.status==="doing").length,
    postponed:tasks.filter(t=>t.status==="postponed").length,
  };

  const ltPaneItem = ltPaneId ? lt.find(x=>x.id===ltPaneId) : null;

  const sortP=a=>[...a].sort((x,y)=>({high:0,mid:1,low:2}[x.priority]-{high:0,mid:1,low:2}[y.priority]));

  // ── helpers: Notion-like table sorting & grouping done bottom ──
  const toggleSort=(field)=>{
    setTSort(s=>{
      if(s.field!==field) return {field,dir:"asc"};
      return {field,dir:s.dir==="asc"?"desc":"asc"};
    });
  };
  const sortIndicator=(field)=>{
    if(tSort.field!==field) return "";
    return tSort.dir==="asc" ? " ▲" : " ▼";
  };
  const sortKey=(t,field)=>{
    if(field==="title") return (t.title||"").toLowerCase();
    if(field==="status") return ({todo:1,doing:2,postponed:3,done:4}[t.status] ?? 99);
    if(field==="priority") return ({high:0,mid:1,low:2}[t.priority] ?? 99);
    if(field==="tag") return (t.tag||"").toLowerCase();
    if(field==="desc") return (t.desc||"").toLowerCase();
    if(field==="createdAt") return t.createdAt||0;
    if(field==="linkedLT"){
      const li = t.linkedLT ? lt.find(x=>x.id===t.linkedLT) : null;
      return (li?.title||"").toLowerCase();
    }
    return "";
  };
  const applySort=(arr)=>{
    if(!tSort.field) return arr;
    const dir = tSort.dir==="asc" ? 1 : -1;
    const f = tSort.field;
    return [...arr].sort((a,b)=>{
      const ka = sortKey(a,f), kb = sortKey(b,f);
      if(ka<kb) return -1*dir;
      if(ka>kb) return  1*dir;
      return 0;
    });
  };
  const viewTasks = useMemo(()=>{
    const base = tasks.filter(t=>filt==="all" || t.status===filt);
    if(filt==="done"){
      return applySort(base);
    }
    const undone = base.filter(t=>t.status!=="done");
    const done = base.filter(t=>t.status==="done");
    return [...applySort(undone), ...applySort(done)];
  },[tasks,filt,tSort,lt]);

  // ── task actions ──
  const carryOver=()=>{
    const c=postponed.map(t=>({...t,id:uid(),status:"todo",carriedFrom:PK,createdAt:Date.now()}));
    const up=prevT.map(t=>t.status==="postponed"?{...t,carriedOver:true}:t);
    saveWd({...wd,[PK]:up,[CK]:[...(wd[CK]||[]),...c]});
    setPostModal(false);toast("已结转 "+c.length+" 个任务 ✨");
  };

  const insertBeforeDone=(arr, item)=>{
    const idx = arr.findIndex(x=>x.status==="done");
    if(idx===-1) return [...arr,item];
    const copy=[...arr];
    copy.splice(idx,0,item);
    return copy;
  };

  const addTask=()=>{
    if(!wf.title.trim())return;
    const nt = {
      id:uid(),
      ...wf,
      title:wf.title.trim(),
      desc:(wf.desc||"").trim(),
      tag:(wf.tag||"").trim(),
      createdAt:Date.now()
    };
    const next = insertBeforeDone(tasks, nt);
    saveWd({...wd,[week]:next});
    const nextStatus = (filt!=="all" && SL[filt]) ? filt : "todo";
    setWf({title:"",desc:"",priority:"mid",status:nextStatus,tag:"",linkedLT:null});
    toast("任务已添加");
  };

  const delTask=id=>{
    saveWd({...wd,[week]:tasks.filter(t=>t.id!==id)});
    toast("已删除","warn");
  };

  const updateTaskField=(id, field, value)=>{
    const next = tasks.map(t=>t.id===id ? {...t,[field]:value} : t);
    saveWd({...wd,[week]:next});
  };

  const setStatusSmart=(id, status)=>{
    const cur = tasks.find(t=>t.id===id);
    if(!cur) return;

    let nextTask = {...cur, status};

    // handle prevStatus for checkbox experience
    if(status==="done" && cur.status!=="done"){
      nextTask.prevStatus = cur.status;
    }
    if(status!=="done" && cur.status==="done"){
      // leaving done: keep prevStatus if user changed via dropdown
      nextTask.prevStatus = undefined;
    }

    let rest = tasks.filter(t=>t.id!==id);

    // keep done always at bottom (unless filter is done-only)
    if(status==="done"){
      rest = [...rest, nextTask];
    }else{
      rest = insertBeforeDone(rest, nextTask);
    }

    saveWd({...wd,[week]:rest});

    if(status==="postponed")toast("已推迟 ⏰");
    if(status==="done")toast("完成 🎉");
  };

  const toggleDone=(id, checked)=>{
    const cur = tasks.find(t=>t.id===id);
    if(!cur) return;

    if(checked){
      setStatusSmart(id,"done");
    }else{
      const back = cur.prevStatus || "todo";
      // restore and place before done group
      const restored = {...cur, status:back, prevStatus:undefined};
      let rest = tasks.filter(t=>t.id!==id);
      rest = insertBeforeDone(rest, restored);
      saveWd({...wd,[week]:rest});
    }
  };

  // ── LT actions ──
  const addLT=()=>{
    if(!lf.title.trim())return;
    saveLt([...lt,{
      id:uid(),
      ...lf,
      title:lf.title.trim(),
      desc:(lf.desc||"").trim(),
      tag:(lf.tag||"").trim(),
      createdAt:Date.now(),
      status:"doing",
      logs:[]
    }]);
    setLf({title:"",desc:"",priority:"mid",tag:""});
    setShowLTA(false);
    toast("长期任务已创建");
  };

  const updateLT=()=>{
    if(!lf.title.trim())return;
    saveLt(lt.map(x=>x.id===editLT.id?{...x,...lf}:x));
    setEditLT(null);
    toast("已更新");
  };

  const delLT=id=>{
    saveLt(lt.filter(x=>x.id!==id));
    if(ltPaneId===id) setLtPaneId(null);
    toast("已删除","warn");
  };

  const toggleLT=id=>{
    saveLt(lt.map(x=>x.id===id?{...x,status:x.status==="done"?"doing":"done"}:x));
  };

  const updateLTField=(id, field, value)=>{
    saveLt(lt.map(x=>x.id===id?{...x,[field]:value}:x));
  };

  const addLogAt=(ltId, text, wkKey)=>{
    const txt=(text||"").trim();
    if(!txt) return;
    const wkK = wkKey || wk(0);
    saveLt(lt.map(x=>x.id===ltId?{
      ...x,
      logs:[...(x.logs||[]),{id:uid(),text:txt,week:wkK,weekLabel:wLabel(wkK),createdAt:Date.now()}]
    }:x));
    toast("进展已记录");
  };

  const delLog=(ltId,lid)=>{
    saveLt(lt.map(x=>x.id===ltId?{...x,logs:(x.logs||[]).filter(l=>l.id!==lid)}:x));
  };

  const toggleLtOpen=(id)=>{
    setLtOpen(m=>({...m,[id]:!m[id]}));
  };

  // ── Login screen ──
  if(auth!=="ok") return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f5f6fa"}}>
      <div style={{textAlign:"center",maxWidth:380,width:"90%"}}>
        <div style={{marginBottom:28}}>
          <div style={{width:56,height:56,borderRadius:16,background:"#4f46e5",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",boxShadow:"0 8px 24px rgba(79,70,229,0.3)"}}>
            <span style={{fontSize:24,color:"#fff"}}>✦</span>
          </div>
          <div style={{fontSize:22,fontWeight:700,color:"#1a1a2e"}}>Weekflow</div>
          <div style={{fontSize:13,color:"#aaa",marginTop:4}}>周任务管理 · 跨设备同步</div>
        </div>

        <div style={{background:"#fff",borderRadius:16,padding:28,boxShadow:"0 4px 24px rgba(0,0,0,0.06)",border:"1px solid #ebebf5"}}>
          <div style={{fontSize:13,color:"#888",lineHeight:1.9,marginBottom:24}}>
            数据保存在你自己的 Google Drive<br/>任何设备打开都自动同步
          </div>

          {auth==="loading"
            ?<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,color:"#4f46e5",padding:"12px 0"}}>
              <div style={{width:16,height:16,border:"2px solid #4f46e5",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>连接中...
            </div>
            :<button onClick={login} style={{...pb(),width:"100%",padding:"12px 0",fontSize:14,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",gap:10,boxShadow:"0 4px 16px rgba(79,70,229,0.25)"}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              使用 Google 账号登录
            </button>
          }

          {errMsg&&<div style={{marginTop:14,fontSize:11,color:"#e53935",background:"#fff5f5",border:"1px solid #ffcccc",borderRadius:8,padding:"10px 14px",textAlign:"left",wordBreak:"break-all"}}>
            <b>错误：</b>{errMsg}
          </div>}
        </div>
      </div>
    </div>
  );

  // ── Main app ──
  return (
    <div style={{minHeight:"100vh",background:"#f5f6fa",display:"flex",flexDirection:"column"}}>
      {notif&&<div style={{position:"fixed",top:16,right:16,zIndex:9999,background:notif.type==="warn"?"#fff5f5":"#f0fdf5",border:"1px solid "+(notif.type==="warn"?"#ffcccc":"#bbeecc"),color:notif.type==="warn"?"#cc3333":"#1a7a44",padding:"10px 18px",borderRadius:10,fontSize:13,fontWeight:500,boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}>{notif.msg}</div>}

      {/* Header */}
      <div style={{background:"#fff",borderBottom:"1px solid #ebebf5",padding:"0 24px",height:56,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
        <div style={{display:"flex",alignItems:"center",gap:20}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:28,height:28,borderRadius:8,background:"#4f46e5",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:14,color:"#fff"}}>✦</span></div>
            <span style={{fontSize:15,fontWeight:700,color:"#1a1a2e"}}>Weekflow</span>
          </div>
          <div style={{display:"flex",gap:2}}>
            {[["week","周任务"],["longterm","长期追踪"]].map(([v,l])=>(
              <button key={v} onClick={()=>setView(v)} style={{padding:"5px 14px",borderRadius:7,cursor:"pointer",background:view===v?"#f0f0fa":"transparent",border:"none",color:view===v?"#4f46e5":"#888",fontSize:13,fontWeight:view===v?600:400}}>{l}</button>
            ))}
          </div>
        </div>

        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:12,color:sync==="saved"?"#1a7a44":sync==="syncing"?"#4f46e5":sync==="error"?"#e53935":"#ddd",display:"flex",alignItems:"center",gap:4}}>
            {sync==="syncing"&&<div style={{width:8,height:8,border:"1.5px solid #4f46e5",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>}
            {sync==="saved"?"✓ 已同步":sync==="syncing"?"同步中":sync==="error"?"✗ 失败":""}
          </div>

          {view==="week"&&[["进行中",stats.doing,"#f0faf5","#2a8a5a"],["已完成",stats.done,"#f0fdf5","#1a7a44"],["已推迟",stats.postponed,"#fff5f5","#cc3333"]].map(([l,v,bg,c])=>
            v>0?<div key={l} style={{background:bg,border:"1px solid "+c+"33",borderRadius:20,padding:"3px 10px",fontSize:12,color:c,fontWeight:500}}>{v} {l}</div>:null
          )}

          <div onClick={logout} style={{display:"flex",alignItems:"center",gap:6,background:"#f5f5fa",border:"1px solid #ebebf5",borderRadius:20,padding:"4px 12px 4px 5px",cursor:"pointer"}}>
            <div style={{width:22,height:22,borderRadius:"50%",background:"#4f46e5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:700}}>{userEmail?.[0]?.toUpperCase()||"U"}</div>
            <span style={{fontSize:12,color:"#888",maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{userEmail}</span>
          </div>
        </div>
      </div>

      <div style={{display:"flex",flex:1,overflow:"hidden",minHeight:"calc(100vh - 56px)"}}>
        {/* Sidebar */}
        {view==="week"&&<div style={{width:200,background:"#fff",borderRight:"1px solid #ebebf5",padding:"14px 0",flexShrink:0,overflowY:"auto"}}>
          <div style={{padding:"0 14px 8px",fontSize:10,color:"#bbb",letterSpacing:2,fontWeight:600,textTransform:"uppercase"}}>历史周</div>
          {allWeeks.map(w=>(
            <div key={w} onClick={()=>{setWeek(w);setFilt("all");setShowAdd(false);setEditT(null);}}
              style={{padding:"8px 14px",cursor:"pointer",background:week===w?"#f0f0fa":"transparent",borderLeft:week===w?"2px solid #4f46e5":"2px solid transparent",fontSize:12,color:week===w?"#4f46e5":"#888",fontWeight:week===w?600:400,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>{w===CK?"📅 本周":w===PK?"⏮ 上周":w}</span>
              {wd[w]?.length>0&&<span style={{background:week===w?"#e8e8fc":"#f0f0f5",color:week===w?"#4f46e5":"#aaa",borderRadius:10,padding:"1px 6px",fontSize:10,fontWeight:600}}>{wd[w].length}</span>}
            </div>
          ))}
        </div>}

        <div style={{flex:1,padding:"20px 24px",overflowY:"auto"}}>

          {/* WEEK VIEW */}
          {view==="week"&&<>
            {hasAlert&&<div style={{background:"#fff8f0",border:"1px solid #ffd8a0",borderRadius:12,padding:"14px 18px",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
              <div>
                <div style={{color:"#e07800",fontWeight:600,fontSize:13}}>⚠️ 上周有 {postponed.length} 个推迟任务</div>
                <div style={{color:"#b08040",fontSize:12,marginTop:3}}>{postponed.map(t=>t.title).join(" · ")}</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setPostModal(true)} style={{background:"#fff",border:"1px solid #ffd8a0",color:"#e07800",padding:"5px 14px",borderRadius:7,cursor:"pointer",fontSize:12}}>查看</button>
                <button onClick={carryOver} style={{background:"#f57c00",border:"none",color:"#fff",padding:"5px 14px",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:600}}>一键结转本周 →</button>
              </div>
            </div>}

            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <div style={{display:"flex",gap:3,background:"#fff",border:"1px solid #ebebf5",borderRadius:9,padding:3}}>
                {["all","todo","doing","done","postponed"].map(f=>(
                  <button key={f} onClick={()=>setFilt(f)} style={{padding:"4px 11px",borderRadius:7,cursor:"pointer",fontSize:12,border:"none",background:filt===f?"#4f46e5":"transparent",color:filt===f?"#fff":"#888",fontWeight:filt===f?600:400}}>
                    {f==="all"?"全部":SL[f]} <span style={{opacity:0.7,fontSize:11}}>{f==="all"?tasks.length:tasks.filter(t=>t.status===f).length}</span>
                  </button>
                ))}
              </div>

              <div className="wfmuted">
                {canEdit ? "像 Notion 一样：直接在表格里填，回车添加" : "历史周只读"}
              </div>
            </div>

            {/* Notion-like table */}
            <table className="wftable">
              <thead>
                <tr>
                  <th style={{width:44,cursor:"default"}}>✓</th>
                  <th onClick={()=>toggleSort("title")}>任务{sortIndicator("title")}</th>
                  <th onClick={()=>toggleSort("status")} style={{width:120}}>状态{sortIndicator("status")}</th>
                  <th onClick={()=>toggleSort("priority")} style={{width:130}}>优先级{sortIndicator("priority")}</th>
                  <th onClick={()=>toggleSort("tag")} style={{width:160}}>标签{sortIndicator("tag")}</th>
                  <th onClick={()=>toggleSort("linkedLT")} style={{width:200}}>关联长期{sortIndicator("linkedLT")}</th>
                  <th onClick={()=>toggleSort("desc")}>备注{sortIndicator("desc")}</th>
                  <th style={{width:84,cursor:"default"}}></th>
                </tr>
              </thead>
              <tbody>
                {viewTasks.length===0 && !canEdit && (
                  <tr className="wfrow">
                    <td colSpan={8} style={{padding:"22px 12px",color:"#bbb",textAlign:"center"}}>
                      {filt==="all"?"本周暂无任务":"没有「"+SL[filt]+"」的任务"}
                    </td>
                  </tr>
                )}

                {viewTasks.map(task=>{
                  const done = task.status==="done";
                  const linked = task.linkedLT ? lt.find(x=>x.id===task.linkedLT) : null;
                  return (
                    <tr key={task.id} className={"wfrow "+(done?"wfrowdone":"")}>
                      <td>
                        <input
                          className="wfcheck"
                          type="checkbox"
                          checked={done}
                          disabled={!canEdit}
                          onChange={e=>toggleDone(task.id, e.target.checked)}
                        />
                      </td>

                      <td>
                        <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
                          <input
                            className="wfcellinput"
                            value={task.title||""}
                            disabled={!canEdit}
                            onChange={e=>updateTaskField(task.id,"title",e.target.value)}
                            style={{
                              textDecoration:done?"line-through":"none",
                              opacity:done?0.55:1
                            }}
                          />
                          {task.carriedFrom && <span className="wfbadge orange">↩ 上周结转</span>}
                        </div>
                      </td>

                      <td>
                        <select className="wfselect" value={task.status} disabled={!canEdit}
                          onChange={e=>setStatusSmart(task.id,e.target.value)}>
                          {Object.entries(SL).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                        </select>
                      </td>

                      <td>
                        <select className="wfselect" value={task.priority||"mid"} disabled={!canEdit}
                          onChange={e=>updateTaskField(task.id,"priority",e.target.value)}>
                          {Object.entries(PS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                        </select>
                      </td>

                      <td>
                        <input className="wfcellinput" value={task.tag||""} disabled={!canEdit}
                          onChange={e=>updateTaskField(task.id,"tag",e.target.value)} />
                      </td>

                      <td>
                        <select className="wfselect" value={task.linkedLT||""} disabled={!canEdit}
                          onChange={e=>updateTaskField(task.id,"linkedLT",e.target.value||null)}>
                          <option value="">—</option>
                          {lt.filter(x=>x.status==="doing").map(x=><option key={x.id} value={x.id}>🔗 {x.title}</option>)}
                        </select>
                      </td>

                      <td>
                        <input className="wfcellinput" value={task.desc||""} disabled={!canEdit}
                          onChange={e=>updateTaskField(task.id,"desc",e.target.value)} />
                      </td>

                      <td>
                        <div className="wfactions">
                          {linked && (
                            <button
                              onClick={()=>{
                                setLogModal(task.linkedLT);
                                setLogTxt("[周任务] "+(task.title||"")+" 更新");
                              }}
                              style={{background:"#f0f5ff",border:"1px solid #dde5ff",color:"#4f46e5",padding:"5px 9px",borderRadius:8,fontSize:12}}
                              title="记录到长期追踪"
                              disabled={!canEdit}
                            >
                              📝
                            </button>
                          )}
                          <button onClick={()=>delTask(task.id)}
                            disabled={!canEdit}
                            style={{background:"#fff5f5",border:"1px solid #ffcccc",color:"#cc3333",padding:"5px 9px",borderRadius:8,fontSize:12}}
                            title="删除"
                          >
                            🗑
                          </button>
                        </div>
                      </td>
                    </tr>
                  );
                })}

                {/* Draft row (add) */}
                {canEdit && (
                  <tr className="wfrow">
                    <td>
                      <input className="wfcheck" type="checkbox" disabled checked={false}/>
                    </td>
                    <td>
                      <input
                        className="wfcellinput"
                        value={wf.title}
                        placeholder="新任务…（回车添加）"
                        onChange={e=>setWf(f=>({...f,title:e.target.value}))}
                        onKeyDown={e=>{
                          if(e.key==="Enter"){
                            e.preventDefault();
                            addTask();
                          }
                        }}
                      />
                    </td>
                    <td>
                      <select className="wfselect" value={wf.status}
                        onChange={e=>setWf(f=>({...f,status:e.target.value}))}>
                        {Object.entries(SL).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                      </select>
                    </td>
                    <td>
                      <select className="wfselect" value={wf.priority}
                        onChange={e=>setWf(f=>({...f,priority:e.target.value}))}>
                        {Object.entries(PS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                      </select>
                    </td>
                    <td>
                      <input className="wfcellinput" value={wf.tag}
                        placeholder="标签"
                        onChange={e=>setWf(f=>({...f,tag:e.target.value}))}
                        onKeyDown={e=>{
                          if(e.key==="Enter"){
                            e.preventDefault();
                            addTask();
                          }
                        }}
                      />
                    </td>
                    <td>
                      <select className="wfselect" value={wf.linkedLT||""}
                        onChange={e=>setWf(f=>({...f,linkedLT:e.target.value||null}))}>
                        <option value="">—</option>
                        {lt.filter(x=>x.status==="doing").map(x=><option key={x.id} value={x.id}>🔗 {x.title}</option>)}
                      </select>
                    </td>
                    <td>
                      <input className="wfcellinput" value={wf.desc}
                        placeholder="备注"
                        onChange={e=>setWf(f=>({...f,desc:e.target.value}))}
                        onKeyDown={e=>{
                          if(e.key==="Enter"){
                            e.preventDefault();
                            addTask();
                          }
                        }}
                      />
                    </td>
                    <td style={{textAlign:"right"}}>
                      <button onClick={addTask} style={{...pb({padding:"7px 12px",borderRadius:10})}}>＋</button>
                    </td>
                  </tr>
                )}
              </tbody>
            </table>

            <div style={{marginTop:10,fontSize:12,color:"#aaa",lineHeight:1.6}}>
              小提示：点击表头可排序；勾选完成会自动挪到列表底部（并同步到 Drive）。
            </div>
          </>}

          {/* LONGTERM VIEW */}
          {view==="longterm"&&<>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div style={{fontSize:13,color:"#aaa"}}>可折叠任务 + 右侧详情面板（时间线/补写过去节点）</div>
              <button onClick={()=>{setShowLTA(v=>!v);setEditLT(null);}} style={pb({padding:"7px 16px"})}>{showLTA?"✕ 取消":"＋ 新建长期任务"}</button>
            </div>

            <div className="ltwrap">
              {/* Left list */}
              <div className="ltleft">
                {(showLTA||editLT)&&<div style={{background:"#fff",border:"1px solid #ebebf5",borderRadius:12,padding:20,marginBottom:14,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                  <div style={{fontWeight:700,color:"#1a1a2e",marginBottom:14}}>{editLT?"编辑长期任务":"新建长期任务"}</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                    <input value={lf.title} onChange={e=>setLf(f=>({...f,title:e.target.value}))} placeholder="任务名称 *" style={{...inp(),gridColumn:"1/-1"}}/>
                    <textarea value={lf.desc} onChange={e=>setLf(f=>({...f,desc:e.target.value}))} placeholder="目标/背景描述" rows={2} style={{...inp(),gridColumn:"1/-1",resize:"none"}}/>
                    <select value={lf.priority} onChange={e=>setLf(f=>({...f,priority:e.target.value}))} style={inp()}>
                      {Object.entries(PS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                    </select>
                    <input value={lf.tag} onChange={e=>setLf(f=>({...f,tag:e.target.value}))} placeholder="标签" style={inp()}/>
                  </div>
                  <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                    <button onClick={()=>{setShowLTA(false);setEditLT(null);}} style={gb()}>取消</button>
                    <button onClick={editLT?updateLT:addLT} style={pb()}>{editLT?"保存":"创建"}</button>
                  </div>
                </div>}

                {lt.length===0
                  ?<div style={{textAlign:"center",color:"#ccc",padding:"60px 0",fontSize:13,lineHeight:2}}>还没有长期任务</div>
                  :<div className="ltlane">
                    {sortP(lt).map(x=>{
                      const logs=x.logs||[];
                      const lastLog=logs[logs.length-1];
                      const p=PS[x.priority||"mid"];
                      const open=!!ltOpen[x.id];
                      const isSel = ltPaneId===x.id;

                      const preview = [...logs].slice(-3).reverse(); // newest 3

                      return (
                        <div key={x.id} className="ltitem" style={{outline:isSel?"2px solid #4f46e533":"none"}}>
                          <div className="ltitemHead" onClick={()=>setLtPaneId(x.id)}>
                            <div className="ltcaret" onClick={(e)=>{e.stopPropagation();toggleLtOpen(x.id);}}>
                              {open?"▾":"▸"}
                            </div>

                            <div className="ltmeta">
                              <div className="lttitle" style={{textDecoration:x.status==="done"?"line-through":"none",opacity:x.status==="done"?0.45:1}}>
                                {x.title}
                              </div>

                              <div className="ltsub">
                                {x.tag && <span className="wfbadge">{x.tag}</span>}
                                <span className="wfbadge" style={{background:p.bg,color:p.color,border:"1px solid "+p.border}}>{p.label}</span>
                                <span className="wfmuted">📝 {logs.length}</span>
                                {lastLog && <span className="wfmuted">🕐 最近：{lastLog.weekLabel}</span>}
                                {x.status==="done" && <span className="wfbadge" style={{background:"#f0fdf5",border:"1px solid #b8e8cc",color:"#1a7a44"}}>✓ 已完成</span>}
                              </div>
                            </div>

                            <div style={{display:"flex",gap:6,flexShrink:0}}>
                              <button
                                onClick={(e)=>{e.stopPropagation(); setLtPaneId(x.id);}}
                                style={{background:"#f0f5ff",border:"1px solid #dde5ff",color:"#4f46e5",padding:"6px 10px",borderRadius:10,fontSize:12,cursor:"pointer"}}
                                title="打开右侧面板"
                              >详情</button>
                              <button
                                onClick={(e)=>{e.stopPropagation(); toggleLT(x.id);}}
                                style={{background:x.status==="done"?"#f5f5fa":"#f0fdf5",border:"1px solid "+(x.status==="done"?"#ebebf5":"#b8e8cc"),color:x.status==="done"?"#888":"#1a7a44",padding:"6px 10px",borderRadius:10,fontSize:12,cursor:"pointer"}}
                              >{x.status==="done"?"↩":"✓"}</button>
                              <button
                                onClick={(e)=>{e.stopPropagation(); delLT(x.id);}}
                                style={{background:"#fff5f5",border:"1px solid #ffcccc",color:"#cc3333",padding:"6px 10px",borderRadius:10,fontSize:12,cursor:"pointer"}}
                              >🗑</button>
                            </div>
                          </div>

                          {open && (
                            <div className="ltsummary">
                              <div className="ltsummaryInner">
                                {preview.length===0
                                  ?<div className="wfmuted">还没有进展记录，点「详情」在右侧补写时间节点</div>
                                  :preview.map(l=>(
                                    <div key={l.id} className="ltlogline">
                                      <div style={{minWidth:0}}>
                                        <div style={{fontSize:11,color:"#4f46e5",fontWeight:700}}>{l.weekLabel}</div>
                                        <div style={{fontSize:12,color:"#666",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{l.text}</div>
                                      </div>
                                      <div style={{fontSize:11,color:"#bbb",flexShrink:0}}>{fmtDT(l.createdAt)}</div>
                                    </div>
                                  ))
                                }
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                }
              </div>

              {/* Right panel */}
              <div className="ltright">
                {!ltPaneItem
                  ?<div style={{textAlign:"center",color:"#bbb",padding:"60px 0",fontSize:13,lineHeight:2}}>
                    选择一个长期任务 →<br/>右侧会显示时间线与编辑区
                  </div>
                  :<div className="ltpanel">
                    <div className="ltpanelHead">
                      <div style={{minWidth:0}}>
                        <div style={{fontWeight:800,fontSize:15,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ltPaneItem.title}</div>
                        <div className="wfmuted" style={{marginTop:3}}>在这里补写过去某周的进展，并形成时间线</div>
                      </div>
                      <div className="ltpanelClose" onClick={()=>setLtPaneId(null)}>✕</div>
                    </div>

                    <div className="ltpanelBody">
                      {/* Edit properties */}
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                        <input
                          value={ltPaneItem.title||""}
                          onChange={e=>updateLTField(ltPaneItem.id,"title",e.target.value)}
                          style={inp({gridColumn:"1/-1"})}
                        />
                        <select
                          value={ltPaneItem.priority||"mid"}
                          onChange={e=>updateLTField(ltPaneItem.id,"priority",e.target.value)}
                          style={inp()}
                        >
                          {Object.entries(PS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                        </select>
                        <input
                          value={ltPaneItem.tag||""}
                          onChange={e=>updateLTField(ltPaneItem.id,"tag",e.target.value)}
                          placeholder="标签"
                          style={inp()}
                        />
                        <textarea
                          value={ltPaneItem.desc||""}
                          onChange={e=>updateLTField(ltPaneItem.id,"desc",e.target.value)}
                          placeholder="目标/背景描述"
                          rows={3}
                          style={inp({gridColumn:"1/-1",resize:"none"})}
                        />
                      </div>

                      {/* Add log */}
                      <div style={{background:"#f8f8fc",border:"1px solid #ebebf5",borderRadius:12,padding:"12px 12px",marginBottom:14}}>
                        <div style={{fontWeight:700,color:"#1a1a2e",fontSize:13,marginBottom:10}}>＋ 记录 / 补写某个时间节点</div>
                        <div style={{display:"grid",gridTemplateColumns:"160px 1fr",gap:10}}>
                          <select value={ltNoteWeek} onChange={e=>setLtNoteWeek(e.target.value)} style={inp()}>
                            {allWeeks.map(w=><option key={w} value={w}>{wLabel(w)}</option>)}
                          </select>
                          <textarea
                            value={ltNoteText}
                            onChange={e=>setLtNoteText(e.target.value)}
                            placeholder="这段时间做了什么？遇到什么问题？下一步？"
                            rows={2}
                            style={inp({resize:"none"})}
                          />
                        </div>
                        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:10}}>
                          <button onClick={()=>setLtNoteText("")} style={gb()}>清空</button>
                          <button onClick={()=>{
                            addLogAt(ltPaneItem.id, ltNoteText, ltNoteWeek);
                            setLtNoteText("");
                          }} style={pb()}>保存进展</button>
                        </div>
                      </div>

                      {/* Timeline grouped by week */}
                      <div style={{fontWeight:800,color:"#1a1a2e",fontSize:13}}>时间线</div>
                      {(!ltPaneItem.logs || ltPaneItem.logs.length===0)
                        ?<div style={{color:"#bbb",padding:"18px 0"}}>还没有进展记录</div>
                        :(()=>{
                          const logs = ltPaneItem.logs || [];
                          const byW = {};
                          logs.forEach(l=>{
                            const k = l.week || "unknown";
                            (byW[k] = byW[k] || []).push(l);
                          });
                          const weeks = Object.keys(byW).sort((a,b)=>weekStartTs(b)-weekStartTs(a));
                          return weeks.map(wkKey=>{
                            const items = byW[wkKey].slice().sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
                            return (
                              <div className="ltgroup" key={wkKey}>
                                <div className="ltgroupTitle">{wLabel(wkKey)}</div>
                                {items.map(l=>(
                                  <div className="ltcard" key={l.id}>
                                    <div className="ltcardTop">
                                      <div className="ltcardTime">{fmtDT(l.createdAt)}</div>
                                      <button className="ltcardDel" onClick={()=>delLog(ltPaneItem.id,l.id)} title="删除">✕</button>
                                    </div>
                                    <div className="ltcardText">{l.text}</div>
                                  </div>
                                ))}
                              </div>
                            );
                          });
                        })()
                      }
                    </div>
                  </div>
                }
              </div>
            </div>
          </>}

        </div>
      </div>

      {/* Modals: carryover + quick log from weekly */}
      {postModal&&<div onClick={()=>setPostModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.22)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:28,maxWidth:440,width:"90%",maxHeight:"75vh",overflow:"auto",boxShadow:"0 8px 40px rgba(0,0,0,0.1)"}}>
          <div style={{fontWeight:700,color:"#e07800",fontSize:15,marginBottom:14}}>⚠️ 上周推迟的任务</div>
          {postponed.map(t=><div key={t.id} style={{background:"#fff8f0",border:"1px solid #ffd8a0",borderRadius:10,padding:"11px 14px",marginBottom:8}}>
            <div style={{fontWeight:600,fontSize:13}}>{t.title}</div>
            {t.desc&&<div style={{color:"#999",fontSize:12,marginTop:2}}>{t.desc}</div>}
          </div>)}
          <div style={{display:"flex",gap:10,marginTop:14}}>
            <button onClick={()=>setPostModal(false)} style={{flex:1,...gb()}}>稍后处理</button>
            <button onClick={carryOver} style={{flex:1,...pb(),background:"#f57c00"}}>结转到本周 →</button>
          </div>
        </div>
      </div>}

      {logModal&&(() => {
        const logItem = lt.find(x=>x.id===logModal);
        if(!logItem) return null;
        return (
          <div onClick={()=>setLogModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.22)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:28,maxWidth:460,width:"90%",boxShadow:"0 8px 40px rgba(0,0,0,0.1)"}}>
              <div style={{fontWeight:800,fontSize:15,marginBottom:4}}>记录本周进展</div>
              <div style={{fontSize:12,color:"#aaa",marginBottom:14}}>「{logItem.title}」· {wLabel(week)}</div>
              <textarea value={logTxt} onChange={e=>setLogTxt(e.target.value)} placeholder="这周做了什么？遇到什么问题？下步计划？" rows={4} style={{...inp(),resize:"none",marginBottom:14}}/>
              <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                <button onClick={()=>setLogModal(null)} style={gb()}>取消</button>
                <button onClick={()=>{
                  addLogAt(logModal, logTxt, week);
                  setLogTxt("");
                  setLogModal(null);
                }} style={pb()}>保存进展</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
</body>
</html>
