<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weekflow</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<style>
body{margin:0;background:#f5f6fa;font-family:-apple-system,BlinkMacSystemFont;}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:10px;border-bottom:1px solid #eee;font-size:14px}
th{cursor:pointer;background:#fafafa;text-align:left}
input,select{font-size:14px;padding:6px}
button{cursor:pointer}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const {useState,useEffect,useCallback,useRef} = React;

const CLIENT_ID="575074826162-67sv63cg4gss5k5t9vcsbds0cedb3ftt.apps.googleusercontent.com";
const SCOPE="https://www.googleapis.com/auth/drive.appdata";
const FILE_NAME="weekflow.json";

const uid=()=>Math.random().toString(36).slice(2,10);

// ---------- Drive API ----------
async function dFind(tok,name){
  const q=encodeURIComponent(`name='${name}' and trashed=false`);
  const url=`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=appDataFolder&fields=files(id,name)`;
  const r=await fetch(url,{headers:{Authorization:"Bearer "+tok}});
  if(!r.ok) throw new Error("find "+r.status);
  const d=await r.json();
  return d.files?.[0]||null;
}

async function dRead(tok,name){
  const f=await dFind(tok,name);
  if(!f) return [];
  const r=await fetch(
    `https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`,
    {headers:{Authorization:"Bearer "+tok}}
  );
  return r.ok?await r.json():[];
}

async function dWrite(tok,name,data){
  const ex=await dFind(tok,name);
  const fd=new FormData();
  fd.append("metadata",new Blob([JSON.stringify(ex?{name}:{name,parents:["appDataFolder"]})],{type:"application/json"}));
  fd.append("file",new Blob([JSON.stringify(data)],{type:"application/json"}));
  await fetch(
    `https://www.googleapis.com/upload/drive/v3/files${ex?"/"+ex.id:""}?uploadType=multipart`,
    {method:ex?"PATCH":"POST",headers:{Authorization:"Bearer "+tok},body:fd}
  );
}

// ---------- App ----------
function App(){

  const [auth,setAuth]=useState(false);
  const [tok,setTok]=useState("");
  const [tasks,setTasks]=useState([]);
  const [input,setInput]=useState("");
  const [sort,setSort]=useState({field:"createdAt",asc:false});

  const syncTimer=useRef(null);

  // login
  const login=()=>{
    const client=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID,
      scope:SCOPE,
      callback:async(res)=>{
        const t=res.access_token;
        setTok(t);
        const data=await dRead(t,FILE_NAME);
        setTasks(data||[]);
        setAuth(true);
      }
    });
    client.requestAccessToken({prompt:"select_account"});
  };

  // auto save
  useEffect(()=>{
    if(!tok) return;
    if(syncTimer.current) clearTimeout(syncTimer.current);
    syncTimer.current=setTimeout(()=>{
      dWrite(tok,FILE_NAME,tasks);
    },800);
  },[tasks]);

  // quick add
  const addTask=()=>{
    if(!input.trim()) return;
    setTasks([...tasks,{
      id:uid(),
      title:input.trim(),
      status:"todo",
      priority:"mid",
      createdAt:Date.now()
    }]);
    setInput("");
  };

  const updateField=(id,field,value)=>{
    setTasks(tasks.map(t=>t.id===id?{...t,[field]:value}:t));
  };

  const remove=(id)=>{
    setTasks(tasks.filter(t=>t.id!==id));
  };

  const sorted=[...tasks].sort((a,b)=>{
    const f=sort.field;
    if(a[f]<b[f]) return sort.asc?-1:1;
    if(a[f]>b[f]) return sort.asc?1:-1;
    return 0;
  });

  if(!auth) return (
    <div style={{padding:40,textAlign:"center"}}>
      <h2>Weekflow</h2>
      <button onClick={login}>使用 Google 登录</button>
    </div>
  );

  return (
    <div style={{padding:20,maxWidth:900,margin:"0 auto"}}>
      <h2>Weekflow</h2>

      {/* Quick Add */}
      <input
        placeholder="添加任务..."
        value={input}
        onChange={e=>setInput(e.target.value)}
        onKeyDown={e=>e.key==="Enter"&&addTask()}
        style={{width:"100%",marginBottom:15}}
      />

      {/* Table */}
      <table>
        <thead>
          <tr>
            <th onClick={()=>setSort({field:"title",asc:!sort.asc})}>任务</th>
            <th onClick={()=>setSort({field:"status",asc:!sort.asc})}>状态</th>
            <th onClick={()=>setSort({field:"priority",asc:!sort.asc})}>优先级</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {sorted.map(t=>(
            <tr key={t.id}>
              <td>
                <input
                  value={t.title}
                  onChange={e=>updateField(t.id,"title",e.target.value)}
                  style={{width:"100%",border:"none",background:"transparent"}}
                />
              </td>
              <td>
                <select
                  value={t.status}
                  onChange={e=>updateField(t.id,"status",e.target.value)}
                >
                  <option value="todo">待开始</option>
                  <option value="doing">进行中</option>
                  <option value="done">已完成</option>
                </select>
              </td>
              <td>
                <select
                  value={t.priority}
                  onChange={e=>updateField(t.id,"priority",e.target.value)}
                >
                  <option value="high">高</option>
                  <option value="mid">中</option>
                  <option value="low">低</option>
                </select>
              </td>
              <td>
                <button onClick={()=>remove(t.id)}>删除</button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
